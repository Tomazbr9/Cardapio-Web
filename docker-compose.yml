version: '3.8'

services:
  
  db:
    image: postgres:15-alpine
    container_name: cw-dev
    restart: always
    environment:
      POSTGRES_DB: cw-db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: